<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rituals of Taste | Premium Tea</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --gold: #c5a059;
            --white: #f5f5f5;
            --gray: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            padding: 20px;
        }

        .hero-content {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1.5s ease forwards;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .gold-subtitle {
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 6px;
            font-size: 0.75rem;
            margin-bottom: 20px;
            display: block;
        }

        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 5.5rem);
            font-weight: 400;
            line-height: 1.1;
            margin-bottom: 30px;
        }

        .line {
            width: 0;
            height: 1px;
            background: var(--gold);
            margin: 0 auto 30px;
            animation: growLine 2s ease forwards 1s;
        }

        @keyframes growLine { to { width: 140px; } }

        #typewriter { 
            color: var(--gold); 
            border-right: 2px solid var(--gold);
            padding-right: 5px;
            animation: blink 0.7s infinite;
        }

        @keyframes blink { 50% { border-color: transparent; } }

        .btn-explore {
            display: inline-block;
            padding: 18px 40px;
            border: 1px solid var(--gold);
            color: var(--gold);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 3px;
            transition: all 0.4s ease;
            margin-top: 20px;
        }

        .btn-explore:hover {
            background: var(--gold);
            color: #000;
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.2);
        }

        /* Collection Section */
        .collection {
            padding: 140px 20px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            text-align: center;
            font-size: 3rem;
            margin-bottom: 90px;
            letter-spacing: 2px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 60px;
        }

        .item {
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow 0.6s ease, border-color 0.6s ease;
            border: 1px solid #111; /* Тонкая темная рамка по умолчанию */
            padding: 20px;
        }

        .img-container {
            width: 100%;
            height: 480px;
            margin-bottom: 30px;
            overflow: hidden;
            background-color: #111;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1.2s ease, opacity 0.6s ease;
            opacity: 0.9;
        }

        /* Золотой hover-эффект */
        .item:hover {
            transform: translateY(-15px);
            border-color: var(--gold); /* Появляется золотая рамка */
            box-shadow: 0 10px 40px rgba(197, 160, 89, 0.1); /* Мягкое золотое свечение */
        }

        .item:hover img {
            transform: scale(1.08);
            opacity: 1;
        }

        .item h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.7rem;
            margin-bottom: 12px;
            font-weight: 400;
        }

        .price {
            color: var(--gold);
            font-size: 1.1rem;
            letter-spacing: 2px;
            font-weight: 300;
        }

        /* Footer */
        footer {
            padding: 100px 20px;
            border-top: 1px solid #1a1a1a;
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: var(--gray);
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-content">
            <span class="gold-subtitle">Handcrafted Excellence</span>
            <h1 class="main-title">The Art of <br><span id="typewriter"></span></h1>
            <div class="line"></div>
            <a href="#collection" class="btn-explore">Explore Collection</a>
        </div>
    </section>

    <section id="collection" class="collection">
        <h2 class="section-title">The Collection</h2>
        <div class="grid">
            <div class="item">
                <div class="img-container">
                    <img src="https://cdn.shopify.com/s/files/1/0754/3232/9387/files/tea-1.jpg?v=1776201940" alt="Midnight Porcelain">
                </div>
                <h3>Midnight Porcelain</h3>
                <span class="price">$120.00</span>
            </div>
            <div class="item">
                <div class="img-container">
                    <img src="https://cdn.shopify.com/s/files/1/0754/3232/9387/files/tea-3.jpg?v=1776201940" alt="Imperial Jade">
                </div>
                <h3>Imperial Jade</h3>
                <span class="price">$95.00</span>
            </div>
            <div class="item">
                <div class="img-container">
                    <img src="https://cdn.shopify.com/s/files/1/0754/3232/9387/files/tea-2.jpg?v=1776201940" alt="Zen Glass">
                </div>
                <h3>Zen Glass</h3>
                <span class="price">$75.00</span>
            </div>
        </div>
    </section>

    <footer>
        &copy; 2026 Rituals of Taste. All Rights Reserved.
    </footer>

    <script>
        const text = "Tea Ceremony";
        let i = 0;
        
        function typeWriter() {
            const target = document.getElementById("typewriter");
            if (target && i < text.length) {
                target.innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 140);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(typeWriter, 1200);
        });
    </script>
</body>
</html>
