<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rituals of Taste | Premium Tea</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --gold: #c5a059; --white: #f5f5f5; --gray: #888; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { background: var(--bg); color: var(--white); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Hero */
        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; background: radial-gradient(circle, #1a1a1a 0%, #0a0a0a 100%); }
        .gold-subtitle { color: var(--gold); text-transform: uppercase; letter-spacing: 5px; font-size: 0.8rem; margin-bottom: 20px; }
        .main-title { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 8vw, 5rem); font-weight: 400; margin-bottom: 30px; }
        .line { width: 100px; height: 1px; background: var(--gold); margin: 0 auto 30px; }
        #typewriter { color: var(--gold); border-right: 2px solid var(--gold); padding-right: 5px; }
        .btn-explore { display: inline-block; padding: 15px 35px; border: 1px solid var(--gold); color: var(--gold); text-decoration: none; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px; transition: 0.4s; }
        .btn-explore:hover { background: var(--gold); color: #000; }

        /* Collection */
        .collection { padding: 100px 20px; max-width: 1200px; margin: 0 auto; }
        .section-title { font-family: 'Playfair Display', serif; text-align: center; font-size: 2.5rem; margin-bottom: 60px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        .item { text-align: center; padding: 20px; border: 1px solid #1a1a1a; transition: 0.3s; }
        .item:hover { border-color: var(--gold); }
        .img-box { width: 100%; height: 400px; background: #111; margin-bottom: 20px; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .price { color: var(--gold); display: block; margin-top: 10px; font-weight: bold; }

        footer { padding: 40px; text-align: center; border-top: 1px solid #1a1a1a; color: var(--gray); font-size: 0.8rem; }
    </style>
</head>
<body>

    <section class="hero">
        <div>
            <p class="gold-subtitle">Handcrafted Excellence</p>
            <h1 class="main-title">The Art of <br><span id="typewriter"></span></h1>
            <div class="line"></div>
            <a href="#collection" class="btn-explore">Explore Collection</a>
        </div>
    </section>

    <section id="collection" class="collection">
        <h2 class="section-title">The Collection</h2>
        <div class="grid">
            <div class="item">
                <div class="img-box">
                    <img src="images/tea-1.jpg" alt="Set 1" onerror="this.src='https://via.placeholder.com/400x400/111/c5a059?text=Image+Not+Found'">
                </div>
                <h3>Midnight Porcelain</h3>
                <span class="price">$120.00</span>
            </div>
            <div class="item">
                <div class="img-box">
                    <img src="images/tea-2.jpg" alt="Set 2" onerror="this.src='https://via.placeholder.com/400x400/111/c5a059?text=Image+Not+Found'">
                </div>
                <h3>Imperial Jade</h3>
                <span class="price">$95.00</span>
            </div>
            <div class="item">
                <div class="img-box">
                    <img src="images/tea-3.jpg" alt="Set 3" onerror="this.src='https://via.placeholder.com/400x400/111/c5a059?text=Image+Not+Found'">
                </div>
                <h3>Zen Glass</h3>
                <span class="price">$75.00</span>
            </div>
        </div>
    </section>

    <footer>© 2026 Rituals of Taste. All Rights Reserved.</footer>

    <script>
        const text = "Tea Ceremony";
        let i = 0;
        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 150);
            }
        }
        window.onload = typeWriter;
    </script>
</body>
</html>
