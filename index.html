<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rituals of Taste | Premium Tea</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background-color: #0a0a0a;
            color: #f5f5f5;
            font-family: 'Playfair Display', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .hero {
            text-align: center;
            padding: 20px;
        }

        .gold-subtitle {
            color: #c5a059;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeIn 2s forwards 0.5s;
        }

        .main-title {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 400;
            line-height: 1.2;
            margin-bottom: 30px;
        }

        .line {
            width: 0;
            height: 1px;
            background: #c5a059;
            margin: 0 auto 30px;
            animation: growLine 1.5s forwards 1s;
        }

        .description {
            font-family: sans-serif;
            color: #888;
            font-size: 1rem;
            letter-spacing: 1px;
            max-width: 500px;
            margin: 0 auto;
            opacity: 0;
            animation: fadeIn 2s forwards 2s;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes growLine {
            to { width: 150px; }
        }

        #typewriter {
            color: #c5a059;
            border-right: 2px solid #c5a059;
            padding-right: 5px;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="content">
            <h2 class="gold-subtitle">Handcrafted Collection</h2>
            <h1 class="main-title">The Art of <br><span id="typewriter"></span></h1>
            <div class="line"></div>
            <p class="description">Эксклюзивные чайные наборы для тех, кто ценит момент.</p>
        </div>
    </div>

    <script>
        const text = "Tea Ceremony";
        let i = 0;

        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 150);
            }
        }

        window.onload = () => {
            setTimeout(typeWriter, 1500);
        };
    </script>
</body>
</html>
