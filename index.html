<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rituals of Taste</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            color: #f5f5f5;
            font-family: 'Playfair Display', serif;
            text-align: center;
        }
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #typewriter {
            color: #c5a059;
            min-height: 1.2em;
            display: inline-block;
        }
        .gold-line {
            width: 80px;
            height: 1px;
            background: #c5a059;
            margin: 20px auto;
        }
        .collection {
            padding: 100px 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .item {
            border: 1px solid #222;
            padding: 20px;
        }
        .img-placeholder {
            width: 100%;
            height: 350px;
            background: #111;
            margin-bottom: 20px;
        }
        .img-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .price { color: #c5a059; font-weight: bold; }
        a.btn {
            color: #c5a059;
            text-decoration: none;
            border: 1px solid #c5a059;
            padding: 10px 25px;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <section class="hero">
        <p style="color: #c5a059; letter-spacing: 4px;">EST. 2026</p>
        <h1 style="font-size: 3rem; margin: 10px 0;">The Art of <br><span id="typewriter"></span></h1>
        <div class="gold-line"></div>
        <a href="#collection" class="btn">Explore</a>
    </section>

    <section id="collection" class="collection">
        <h2 style="margin-bottom: 50px;">The Collection</h2>
        <div class="grid">
            <div class="item">
                <div class="img-placeholder"><img src="images/tea-1.jpg" onerror="this.style.display='none'"></div>
                <h3>Midnight Porcelain</h3>
                <p class="price">$120.00</p>
            </div>
            <div class="item">
                <div class="img-placeholder"><img src="images/tea-2.jpg" onerror="this.style.display='none'"></div>
                <h3>Imperial Jade</h3>
                <p class="price">$95.00</p>
            </div>
            <div class="item">
                <div class="img-placeholder"><img src="images/tea-3.jpg" onerror="this.style.display='none'"></div>
                <h3>Zen Glass</h3>
                <p class="price">$75.00</p>
            </div>
        </div>
    </section>

    <script>
        const text = "Tea Ceremony";
        let i = 0;
        function type() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++;
                setTimeout(type, 150);
            }
        }
        // Запуск через 1 секунду после загрузки
        setTimeout(type, 1000);
    </script>
</body>
</html>
